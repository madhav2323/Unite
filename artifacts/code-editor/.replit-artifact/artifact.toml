kind = "web"
previewPath = "/"
title = "Real-Time Collaborative Code Editor"
version = "1.0.0"
id = "artifacts/code-editor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22595
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/code-editor run dev"

[services.env]
PORT = "22595"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/code-editor", "run", "build"]
publicDir = "artifacts/code-editor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
